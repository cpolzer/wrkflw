site_name: wrkflw Developer Docs
site_description: Developer documentation for the wrkflw workflow engine
docs_dir: docs

validation:
  links:
    # Relative links inside snippet-included spec files (e.g. checklists/requirements.md
    # referencing ../spec.md) resolve incorrectly in MkDocs context. Downgrade to info
    # so --strict doesn't abort on these expected false positives.
    not_found: info

# requirements.txt lives under docs/ for convenience but is not site content.
exclude_docs: |
  requirements.txt

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

